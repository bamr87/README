services:
  # Wiki.js - Modern wiki application
  wiki:
    image: requarks/wiki:2
    container_name: bamr87-wiki
    depends_on:
      - db
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${WIKI_DB_USER:-wikijs}
      DB_PASS: ${WIKI_DB_PASS:-wikijsrocks}
      DB_NAME: ${WIKI_DB_NAME:-wiki}
      # Wiki.js configuration
      WIKI_ADMIN_EMAIL: ${WIKI_ADMIN_EMAIL:-admin@example.com}
      WIKI_SITE_URL: ${WIKI_SITE_URL:-http://localhost:3000}
      WIKI_UPGRADE_COMPANION: ${WIKI_UPGRADE_COMPANION:-0}
    ports:
      - "${WIKI_PORT:-3000}:3000"
    volumes:
      - wiki-data:/wiki/data
      - wiki-repo:/wiki/repo
      # Mount local docs directory for content sync
      - ./docs:/wiki/content:ro
    networks:
      - wiki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: bamr87-wiki-db
    environment:
      POSTGRES_DB: ${WIKI_DB_NAME:-wiki}
      POSTGRES_USER: ${WIKI_DB_USER:-wikijs}
      POSTGRES_PASSWORD: ${WIKI_DB_PASS:-wikijsrocks}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - db-data:/var/lib/postgresql/data
      # Optional: Custom PostgreSQL configuration
      # - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - wiki-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WIKI_DB_USER:-wikijs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bamr87-wiki-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - wiki-network
    restart: unless-stopped
    profiles:
      - admin

volumes:
  wiki-data:
    driver: local
  wiki-repo:
    driver: local
  db-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  wiki-network:
    driver: bridge
