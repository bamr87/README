site_name: bamr87 Documentation
site_description: Aggregated documentation built from multiple source repositories
site_author: Amr Abdel-Motaleb
site_url: https://bamr87.github.io/README/

# Repository
repo_name: bamr87/README
repo_url: https://github.com/bamr87/README
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2025 Amr Abdel-Motaleb

# Configuration
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - toc.follow
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - tags

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
# Curated top-level sections, each pointing at its repo's index page. We do
# NOT auto-generate the full tree: docs/ is generated aggregation output that
# carries upstream Jekyll frontmatter (e.g. `icon: <bootstrap-name>`), which
# Material tries to resolve as an SVG icon when a page is a nav entry and
# fails the build. Pointing nav at the index files keeps those pages out of
# the nav while MkDocs still builds and indexes every page for full-text
# search. Don't hand-edit the generated docs to "fix" this — see CLAUDE.md.
nav:
  - Home: index.md
  - Scripts: scripts/README.md
  - Skills: skills/README.md
  - Barody Project: barodybroject/README.md
  - Bash Crawl: bashcrawl/README.md
  - Zer0 Mistakes: zer0-mistakes/README.md
  - IT Journey: it-journey/index.md
  - OverTheWire: OverTheWire-website/README.md
  - Wargames: wargames/index.md
  - Results: results/index.md
  - Sitemap: sitemap.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bamr87
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/amrabdel
    - icon: fontawesome/solid/globe
      link: https://bashconsultants.com
