name: Docs Quality Check

on:
  push:
    branches:
      - 'quality/*'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'context/**'
      - '_data/**'
      - 'mcp/**'
      - 'hooks.d/**'
      - '.mcp.json'
      - '**.md'
      - 'requirements.txt'
      - '.github/workflows/docs-quality-check.yaml'
  workflow_dispatch: {}

concurrency:
  group: dqc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    name: Docs Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The repo default GITHUB_TOKEN is read-only; the PR comment step needs
    # issues: write (PR comments are issue comments).
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Validate SCHEMA pyramid (drift gate)
        run: python3 scripts/schema_lint.py check .

      - name: Run doc lint and frontmatter checks
        run: |
          set -euo pipefail
          python3 scripts/lint_docs.py || true
          python3 scripts/check_frontmatter.py || true

      - name: Generate docs report artifact
        run: |
          set -euo pipefail
          python3 scripts/generate_docs_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-quality-report
          path: docs/results/docs_quality_report.json
      # `body:` is never shell-expanded, so $(cat ...) would post literally.
      # Build the comment body in a run step and hand it over via body-path.
      - name: Build PR comment body
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          report=docs/results/docs_quality_report.json
          {
            echo '## Docs Quality Report'
            echo '```json'
            cat "$report" 2>/dev/null || echo '{}'
            echo '```'
            echo
            echo '## Top Lint Issues (first 20 files)'
            echo '```json'
            jq '.top_issues' "$report" 2>/dev/null || echo '[]'
            echo '```'
          } > docs/results/pr_comment.md

      - name: Add report comment to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: docs/results/pr_comment.md

      - name: Show summary (optional)
        if: always()
        run: |
          echo "Docs quality check completed. If any commands failed above they will appear in the Actions log."
