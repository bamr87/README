name: Aggregate Documentation

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly, Monday 03:00 UTC (off the congested midnight slot)
  workflow_dispatch:  # Manual trigger

# The default GITHUB_TOKEN on this repo is read-only; the commit step needs
# write access to push the aggregated docs back to main.
permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Sync repos.txt from the fleet registry
        run: python3 -m scripts.context_engine sync

      - name: Run aggregation script
        run: bash scripts/aggregate.sh

      - name: Regenerate corpus index
        run: python3 scripts/generate_docs_index.py

      # Rebuilds the context pyramid (facts -> cards -> apex -> query index)
      # and regenerates the README AUTO span + docs/index.md. AI enrichment
      # auto-enables when a provider key secret is configured; without one
      # the build is heuristic and fully deterministic.
      - name: Build context pyramid
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python3 -m scripts.context_engine build

      - name: Validate SCHEMA pyramid
        run: python3 scripts/schema_lint.py check .

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated docs aggregation + context refresh"
          branch: main
